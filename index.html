<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>빗방울 모으기 대작전! 🌧️</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
body { margin: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #e8f4f8; }
.screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
.screen.active { display: flex; }

/* START SCREEN */
#startScreen {
  background: linear-gradient(180deg, #b8d8e8 0%, #d4eaf5 40%, #e8f0e0 100%);
}
.title-area {
  text-align: center;
  margin-bottom: 20px;
}
.title-emoji { font-size: 60px; margin-bottom: 10px; }
.title-text { font-size: 28px; font-weight: bold; color: #4a7c8f; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
.subtitle { font-size: 14px; color: #6a9aaa; margin-top: 8px; line-height: 1.6; }
.cast-info { font-size: 16px; color: #5a8a9a; margin: 15px 0; padding: 12px 20px; background: rgba(255,255,255,0.6); border-radius: 20px; }
.cup-select { display: flex; gap: 20px; margin: 20px 0; }
.cup-btn {
  width: 120px; height: 140px; border: 3px solid transparent; border-radius: 20px;
  background: rgba(255,255,255,0.7); display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s;
}
.cup-btn.selected { border-color: #ffaa55; background: rgba(255,200,150,0.5); transform: scale(1.05); }
.cup-btn:active { transform: scale(0.95); }
.cup-emoji { font-size: 50px; }
.cup-name { font-size: 16px; font-weight: bold; color: #5a7a8a; margin-top: 8px; }
.start-btn {
  margin-top: 20px; padding: 15px 50px; font-size: 22px; font-weight: bold;
  color: white; background: linear-gradient(135deg, #7bc6cc, #5aadba); border: none;
  border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(90,173,186,0.4);
  transition: all 0.2s;
}
.start-btn:active { transform: scale(0.95); }
.start-btn:disabled { opacity: 0.5; }
.date-info { font-size: 12px; color: #8ab; margin-top: 15px; }

/* GAME SCREEN */
#gameScreen {
  background: linear-gradient(180deg, #a0c4d8 0%, #c8dde8 50%, #d8e8d0 100%);
  position: relative;
}
.game-hud {
  position: absolute; top: 0; left: 0; right: 0; padding: 10px 15px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.4); backdrop-filter: blur(5px); z-index: 10;
}
.hud-item { display: flex; flex-direction: column; align-items: center; }
.hud-label { font-size: 11px; color: #5a8a9a; }
.hud-value { font-size: 18px; font-weight: bold; color: #3a6a7a; }
.stage-badge {
  padding: 4px 14px; background: linear-gradient(135deg, #ffcc66, #ffaa44);
  border-radius: 15px; font-size: 13px; font-weight: bold; color: white;
  box-shadow: 0 2px 8px rgba(255,170,68,0.4);
}
#gameCanvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
}
.rain-bg-drop {
  position: absolute; width: 2px; background: rgba(150,190,220,0.3);
  border-radius: 1px; animation: rainFall linear infinite; pointer-events: none; z-index: 1;
}
@keyframes rainFall {
  0% { transform: translateY(-10px); opacity: 0.3; }
  100% { transform: translateY(100vh); opacity: 0; }
}

/* STAGE OVERLAY */
.stage-overlay {
  display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4); z-index: 100; flex-direction: column;
  align-items: center; justify-content: center;
}
.stage-overlay.active { display: flex; }
.stage-overlay-box {
  background: rgba(255,255,255,0.95); border-radius: 25px; padding: 30px 40px;
  text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  animation: popIn 0.3s ease-out;
}
@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.stage-overlay-emoji { font-size: 50px; margin-bottom: 10px; }
.stage-overlay-text { font-size: 24px; font-weight: bold; color: #4a7c8f; }
.stage-overlay-sub { font-size: 14px; color: #7aaa; margin-top: 8px; }

/* RESULT SCREEN */
#resultScreen {
  background: linear-gradient(180deg, #f0e6ff 0%, #ffe6f0 50%, #fff0e6 100%);
}
.result-box {
  background: rgba(255,255,255,0.85); border-radius: 25px; padding: 30px;
  text-align: center; width: 85%; max-width: 350px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}
.result-title { font-size: 28px; font-weight: bold; color: #7a5aaa; margin-bottom: 5px; }
.result-chars { font-size: 50px; margin: 15px 0; }
.result-score { font-size: 42px; font-weight: bold; color: #ff7755; margin: 10px 0; }
.result-label { font-size: 14px; color: #8a8a9a; }
.result-detail { font-size: 15px; color: #6a7a8a; margin: 5px 0; line-height: 1.8; }
.result-badge {
  display: inline-block; padding: 8px 20px; margin: 15px 0;
  background: linear-gradient(135deg, #ffcc44, #ffaa22); border-radius: 20px;
  font-size: 16px; font-weight: bold; color: white;
  box-shadow: 0 3px 10px rgba(255,170,34,0.4);
}
.retry-btn {
  margin-top: 15px; padding: 14px 45px; font-size: 20px; font-weight: bold;
  color: white; background: linear-gradient(135deg, #aa88dd, #8866cc); border: none;
  border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(136,102,204,0.4);
}
.retry-btn:active { transform: scale(0.95); }

/* Window frame decoration */
.window-frame {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(180deg, #c8b090, #a08060);
  border-top: 4px solid #b09878; z-index: 5; pointer-events: none;
}
.windowsill {
  position: absolute; top: -8px; left: -5px; right: -5px; height: 12px;
  background: #d4c0a0; border-radius: 3px;
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <div class="title-area">
    <div class="title-emoji">🌧️☔</div>
    <div class="title-text">빗방울 모으기 대작전!</div>
    <div class="subtitle">봄비가 내리는 창가에서<br>귀여운 컵으로 빗방울을 받아요!</div>
  </div>
  <div class="cast-info">🐩 배추 · 김치 🤍</div>
  <div style="font-size:13px; color:#6a9aaa; margin-bottom:5px;">컵을 선택하세요!</div>
  <div class="cup-select">
    <div class="cup-btn" id="cupBaechu" onclick="selectCup('baechu')">
      <div class="cup-emoji">🐩</div>
      <div class="cup-name">배추 컵</div>
    </div>
    <div class="cup-btn" id="cupKimchi" onclick="selectCup('kimchi')">
      <div class="cup-emoji">🤍</div>
      <div class="cup-name">김치 컵</div>
    </div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startGame()" disabled>게임 시작! 🌈</button>
  <div class="date-info">2026년 3월 31일 · 봄비 시즌</div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div class="game-hud">
    <div class="hud-item">
      <div class="hud-label">점수</div>
      <div class="hud-value" id="hudScore">0</div>
    </div>
    <div class="stage-badge" id="hudStage">1단계</div>
    <div class="hud-item">
      <div class="hud-label">시간</div>
      <div class="hud-value" id="hudTime">60</div>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div class="window-frame"><div class="windowsill"></div></div>

  <!-- Stage overlay -->
  <div class="stage-overlay" id="stageOverlay">
    <div class="stage-overlay-box">
      <div class="stage-overlay-emoji" id="stageOverlayEmoji">🌟</div>
      <div class="stage-overlay-text" id="stageOverlayText">1단계 시작!</div>
      <div class="stage-overlay-sub" id="stageOverlaySub">빗방울을 모아보세요!</div>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="resultScreen" class="screen">
  <div class="result-box">
    <div class="result-title">게임 결과 🌈</div>
    <div class="result-chars" id="resultChars">🐩🤍</div>
    <div class="result-label">최종 점수</div>
    <div class="result-score" id="resultScore">0</div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-badge" id="resultBadge">봄비 초보</div>
    <br>
    <button class="retry-btn" onclick="resetGame()">다시 하기 🔄</button>
  </div>
</div>

<script>
// Game state
let selectedCup = null;
let score = 0;
let timeLeft = 60;
let currentStage = 1;
let gameRunning = false;
let gameTimer = null;
let spawnTimer = null;
let animFrame = null;
let drops = [];
let particles = [];
let cupX = 0;
let cupY = 0;
let canvasW = 0;
let canvasH = 0;
let ctx = null;
let canvas = null;
let stageStartTime = 0;
let stageTime = [20, 20, 20]; // seconds per stage
let bgRaindrops = [];

// Audio context for sound effects
let audioCtx = null;

function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {}
}

function playTone(freq, duration, type, vol) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.1;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playCollect() { playTone(880, 0.15, 'sine', 0.08); setTimeout(() => playTone(1100, 0.1, 'sine', 0.06), 50); }
function playGold() { playTone(1200, 0.2, 'sine', 0.1); setTimeout(() => playTone(1500, 0.15, 'sine', 0.08), 80); setTimeout(() => playTone(1800, 0.1, 'sine', 0.06), 160); }
function playLightning() { playTone(150, 0.3, 'sawtooth', 0.08); }
function playDrop() { playTone(400 + Math.random()*200, 0.08, 'sine', 0.03); }

// Cup selection
function selectCup(cup) {
  selectedCup = cup;
  document.getElementById('cupBaechu').classList.toggle('selected', cup === 'baechu');
  document.getElementById('cupKimchi').classList.toggle('selected', cup === 'kimchi');
  document.getElementById('startBtn').disabled = false;
}

// Screen management
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

// Start game
function startGame() {
  initAudio();
  showScreen('gameScreen');
  score = 0;
  timeLeft = 60;
  currentStage = 1;
  drops = [];
  particles = [];

  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();

  cupX = canvasW / 2;
  cupY = canvasH - 100;

  updateHUD();
  showStageOverlay(1, '1단계 시작! 🌟', '보슬보슬 봄비를 모아요~', () => {
    gameRunning = true;
    stageStartTime = Date.now();
    startTimers();
    gameLoop();
  });
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvasW = canvas.width;
  canvasH = canvas.height;
}

window.addEventListener('resize', () => {
  if (canvas) resizeCanvas();
});

// Stage overlay
function showStageOverlay(stage, text, sub, callback) {
  const overlay = document.getElementById('stageOverlay');
  document.getElementById('stageOverlayText').textContent = text;
  document.getElementById('stageOverlaySub').textContent = sub;
  const emojis = ['🌟', '⭐⭐', '🌟⭐🌟'];
  document.getElementById('stageOverlayEmoji').textContent = emojis[stage - 1] || '🌟';
  overlay.classList.add('active');
  setTimeout(() => {
    overlay.classList.remove('active');
    if (callback) callback();
  }, 1500);
}

// Timers
function startTimers() {
  if (gameTimer) clearInterval(gameTimer);
  if (spawnTimer) clearInterval(spawnTimer);

  gameTimer = setInterval(() => {
    if (!gameRunning) return;
    timeLeft--;
    updateHUD();
    checkStageProgress();
    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);

  updateSpawnRate();
}

function updateSpawnRate() {
  if (spawnTimer) clearInterval(spawnTimer);
  let interval;
  switch(currentStage) {
    case 1: interval = 600; break;
    case 2: interval = 400; break;
    case 3: interval = 250; break;
    default: interval = 600;
  }
  spawnTimer = setInterval(() => {
    if (gameRunning) spawnDrop();
  }, interval);
}

function checkStageProgress() {
  const elapsed = (60 - timeLeft);
  if (currentStage === 1 && elapsed >= 20) {
    advanceStage(2);
  } else if (currentStage === 2 && elapsed >= 40) {
    advanceStage(3);
  }
}

function advanceStage(newStage) {
  gameRunning = false;
  currentStage = newStage;
  const texts = {
    2: ['2단계 돌입! ⭐⭐', '빗방울이 빨라져요!'],
    3: ['3단계 돌입! 🌟⭐🌟', '최고 난이도! 조심하세요!']
  };
  const t = texts[newStage] || ['다음 단계!', ''];
  updateHUD();
  showStageOverlay(newStage, t[0], t[1], () => {
    gameRunning = true;
    updateSpawnRate();
  });
}

// Spawn drops
function spawnDrop() {
  let penaltyChance;
  let goldChance = 0.08;
  let speed;
  switch(currentStage) {
    case 1: penaltyChance = 0.10; speed = 2.5; break;
    case 2: penaltyChance = 0.25; speed = 3.75; goldChance = 0.10; break;
    case 3: penaltyChance = 0.40; speed = 6.25; goldChance = 0.12; break;
    default: penaltyChance = 0.10; speed = 2.5;
  }

  let type = 'normal';
  const rand = Math.random();
  if (rand < penaltyChance) {
    type = 'lightning';
  } else if (rand < penaltyChance + goldChance) {
    type = 'gold';
  }

  const x = 20 + Math.random() * (canvasW - 40);
  const baseSpeed = speed + Math.random() * 1.5;
  const size = type === 'lightning' ? 28 : (type === 'gold' ? 22 : 18);
  const wobble = (Math.random() - 0.5) * 0.5;

  drops.push({
    x: x,
    y: -20,
    speed: baseSpeed,
    type: type,
    size: size,
    wobble: wobble,
    wobblePhase: Math.random() * Math.PI * 2,
    alive: true,
    alpha: 1,
    sparkle: 0
  });
}

// Update HUD
function updateHUD() {
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudTime').textContent = timeLeft;
  const stageNames = ['1단계', '2단계', '3단계'];
  document.getElementById('hudStage').textContent = stageNames[currentStage - 1] || '1단계';
}

// Particles
function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 5 - 2,
      size: 3 + Math.random() * 4,
      color: color,
      life: 1,
      decay: 0.02 + Math.random() * 0.03
    });
  }
}

function addScoreText(x, y, text, color) {
  particles.push({
    x: x,
    y: y,
    vx: 0,
    vy: -2,
    size: 0,
    color: color,
    life: 1,
    decay: 0.02,
    text: text,
    isText: true
  });
}

// Input handling
let inputActive = false;

function handleInput(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  cupX = (clientX - rect.left) * (canvas.width / rect.width);
  cupY = Math.min((clientY - rect.top) * (canvas.height / rect.height), canvasH - 40);
  cupY = Math.max(cupY, canvasH * 0.5);
}

// Mouse events
document.addEventListener('mousemove', (e) => {
  if (gameRunning) handleInput(e.clientX, e.clientY);
});
document.addEventListener('mousedown', (e) => {
  if (gameRunning) { inputActive = true; handleInput(e.clientX, e.clientY); }
});
document.addEventListener('mouseup', () => { inputActive = false; });

// Touch events
document.addEventListener('touchstart', (e) => {
  if (gameRunning) {
    e.preventDefault();
    inputActive = true;
    const t = e.touches[0];
    handleInput(t.clientX, t.clientY);
  }
}, { passive: false });
document.addEventListener('touchmove', (e) => {
  if (gameRunning) {
    e.preventDefault();
    const t = e.touches[0];
    handleInput(t.clientX, t.clientY);
  }
}, { passive: false });
document.addEventListener('touchend', () => { inputActive = false; });

// Also handle tap on drops
function checkTapOnDrop(clientX, clientY) {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  const tx = (clientX - rect.left) * (canvas.width / rect.width);
  const ty = (clientY - rect.top) * (canvas.height / rect.height);
  
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    if (!d.alive) continue;
    const dist = Math.sqrt((d.x - tx) ** 2 + (d.y - ty) ** 2);
    if (dist < d.size + 20) {
      collectDrop(d, i);
      break;
    }
  }
}

canvas && canvas.addEventListener('click', (e) => {
  checkTapOnDrop(e.clientX, e.clientY);
});
document.addEventListener('touchstart', (e) => {
  if (gameRunning && canvas) {
    const t = e.touches[0];
    checkTapOnDrop(t.clientX, t.clientY);
  }
}, { passive: true });

function collectDrop(drop, index) {
  drop.alive = false;
  if (drop.type === 'normal') {
    score += 1;
    playCollect();
    addParticles(drop.x, drop.y, 'rgba(100,180,255,0.8)', 6);
    addScoreText(drop.x, drop.y - 20, '+1', '#5ac');
  } else if (drop.type === 'gold') {
    score += 5;
    playGold();
    addParticles(drop.x, drop.y, 'rgba(255,215,0,0.9)', 10);
    addScoreText(drop.x, drop.y - 20, '+5 ✨', '#fa0');
  } else if (drop.type === 'lightning') {
    score = Math.max(0, score - 3);
    playLightning();
    addParticles(drop.x, drop.y, 'rgba(255,80,80,0.8)', 8);
    addScoreText(drop.x, drop.y - 20, '-3 ⚡', '#f44');
  }
  updateHUD();
}

// Game loop
function gameLoop() {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Draw background rain
  drawBackgroundRain();

  // Draw window/plant decorations
  drawDecorations();

  if (gameRunning) {
    updateDrops();
    updateParticles();
  }

  drawDrops();
  drawParticles();
  drawCup();

  animFrame = requestAnimationFrame(gameLoop);
}

let bgRainPhase = 0;
function drawBackgroundRain() {
  bgRainPhase += 0.5;
  ctx.save();
  ctx.strokeStyle = 'rgba(150,190,220,0.15)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 30; i++) {
    const x = (i * 37 + bgRainPhase * 0.3) % canvasW;
    const y = (i * 53 + bgRainPhase * 2) % canvasH;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - 1, y + 15);
    ctx.stroke();
  }
  ctx.restore();
}

function drawDecorations() {
  // Small plant pot on windowsill
  const wy = canvasH - 60;
  ctx.save();
  ctx.font = '28px serif';
  ctx.fillText('🌱', 20, wy - 5);
  ctx.fillText('🌿', canvasW - 50, wy - 5);
  ctx.restore();
}

function updateDrops() {
  const cupW = 70;
  const cupH = 50;
  const cupLeft = cupX - cupW / 2;
  const cupRight = cupX + cupW / 2;
  const cupTop = cupY - cupH / 2;

  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    if (!d.alive) { drops.splice(i, 1); continue; }

    d.y += d.speed;
    d.wobblePhase += 0.05;
    d.x += Math.sin(d.wobblePhase) * d.wobble;
    if (d.type === 'gold') d.sparkle = (d.sparkle + 0.1) % (Math.PI * 2);

    // Check collision with cup
    if (d.y + d.size > cupTop && d.y - d.size < cupTop + cupH &&
        d.x > cupLeft && d.x < cupRight) {
      collectDrop(d, i);
      continue;
    }

    // Remove if off screen
    if (d.y > canvasH + 20) {
      drops.splice(i, 1);
      playDrop();
    }
  }
}

function drawDrops() {
  for (const d of drops) {
    if (!d.alive) continue;
    ctx.save();

    if (d.type === 'normal') {
      // Blue raindrop
      const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.size);
      grad.addColorStop(0, 'rgba(120,200,255,0.9)');
      grad.addColorStop(0.6, 'rgba(80,160,240,0.8)');
      grad.addColorStop(1, 'rgba(60,140,220,0.2)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      // Teardrop shape
      ctx.moveTo(d.x, d.y - d.size);
      ctx.bezierCurveTo(d.x + d.size, d.y - d.size * 0.3, d.x + d.size * 0.8, d.y + d.size * 0.7, d.x, d.y + d.size);
      ctx.bezierCurveTo(d.x - d.size * 0.8, d.y + d.size * 0.7, d.x - d.size, d.y - d.size * 0.3, d.x, d.y - d.size);
      ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.arc(d.x - d.size * 0.25, d.y - d.size * 0.1, d.size * 0.2, 0, Math.PI * 2);
      ctx.fill();
    } else if (d.type === 'gold') {
      // Golden sparkly drop
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'rgba(255,215,0,0.8)';
      const ggrad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.size);
      ggrad.addColorStop(0, 'rgba(255,255,150,0.95)');
      ggrad.addColorStop(0.5, 'rgba(255,200,0,0.9)');
      ggrad.addColorStop(1, 'rgba(200,150,0,0.2)');
      ctx.fillStyle = ggrad;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Sparkle
      ctx.strokeStyle = 'rgba(255,255,200,0.9)';
      ctx.lineWidth = 1.5;
      for (let s = 0; s < 4; s++) {
        const angle = d.sparkle + s * Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(d.x + Math.cos(angle) * d.size * 0.6, d.y + Math.sin(angle) * d.size * 0.6);
        ctx.lineTo(d.x + Math.cos(angle) * d.size * 1.4, d.y + Math.sin(angle) * d.size * 1.4);
        ctx.stroke();
      }
    } else if (d.type === 'lightning') {
      // Red lightning drop
      ctx.shadowBlur = 12;
      ctx.shadowColor = 'rgba(255,50,50,0.8)';
      const lgrad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.size);
      lgrad.addColorStop(0, 'rgba(255,150,100,0.95)');
      lgrad.addColorStop(0.5, 'rgba(255,60,60,0.85)');
      lgrad.addColorStop(1, 'rgba(200,0,0,0.2)');
      ctx.fillStyle = lgrad;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,200,0.9)';
      ctx.font = `${d.size}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚡', d.x, d.y);
    }

    ctx.restore();
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    if (p.isText) {
      ctx.fillStyle = p.color;
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawCup() {
  const emoji = selectedCup === 'kimchi' ? '🤍' : '🐩';
  const cupW = 70;
  const cupH = 50;

  ctx.save();
  // Cup body
  ctx.fillStyle = selectedCup === 'kimchi' ? 'rgba(255,230,240,0.85)' : 'rgba(200,230,255,0.85)';
  ctx.strokeStyle = selectedCup === 'kimchi' ? 'rgba(200,150,180,0.9)' : 'rgba(100,160,220,0.9)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cupX - cupW / 2, cupY - cupH / 2);
  ctx.lineTo(cupX - cupW * 0.4, cupY + cupH / 2);
  ctx.lineTo(cupX + cupW * 0.4, cupY + cupH / 2);
  ctx.lineTo(cupX + cupW / 2, cupY - cupH / 2);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Rim
  ctx.fillStyle = selectedCup === 'kimchi' ? 'rgba(230,180,200,0.9)' : 'rgba(150,190,240,0.9)';
  ctx.beginPath();
  ctx.ellipse(cupX, cupY - cupH / 2, cupW / 2, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Character emoji
  ctx.font = '22px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, cupX, cupY + 5);
  ctx.restore();
}

function endGame() {
  gameRunning = false;
  clearInterval(gameTimer);
  clearInterval(spawnTimer);
  cancelAnimationFrame(animFrame);

  // Determine badge
  let badge, title, chars;
  if (score >= 80) {
    badge = '빗방울 전설 🏆';
    title = '완벽해! 🌟';
    chars = '🐩🤍✨';
  } else if (score >= 50) {
    badge = '빗방울 마스터 🌈';
    title = '대단해! 🎉';
    chars = '🐩🤍';
  } else if (score >= 30) {
    badge = '봄비 수집가 ☔';
    title = '잘했어! 😊';
    chars = selectedCup === 'kimchi' ? '🤍' : '🐩';
  } else {
    badge = '봄비 초보 🌱';
    title = '다시 도전! 💪';
    chars = selectedCup === 'kimchi' ? '🤍' : '🐩';
  }

  document.getElementById('resultTitle') && (document.getElementById('resultTitle').textContent = title);
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultChars').textContent = chars;
  document.getElementById('resultBadge').textContent = badge;
  document.getElementById('resultDetail').textContent =
    `삼성전자: ${score}방울 수집 • 3단계 완주`;

  showScreen('resultScreen');
}

function resetGame() {
  selectedCup = null;
  score = 0;
  timeLeft = 60;
  currentStage = 1;
  gameRunning = false;
  drops = [];
  particles = [];
  document.getElementById('cupBaechu').classList.remove('selected');
  document.getElementById('cupKimchi').classList.remove('selected');
  document.getElementById('startBtn').disabled = true;
  showScreen('startScreen');
}

// Init
showScreen('startScreen');
</script>
